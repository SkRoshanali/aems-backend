services:
  # Python FastAPI RAG Service
  - type: web
    name: aems-rag-service
    env: python
    region: oregon
    plan: free  # Change to 'starter' or higher for production
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_5XRN7FWdOpvo@ep-shy-resonance-a9t6ax21-pooler.gwc.azure.neon.tech/neondb?sslmode=require
      
      - key: INTERNAL_SECRET
        sync: false

      - key: GOOGLE_API_KEY
        sync: false

      - key: GOOGLE_EMBEDDING_MODEL
        value: gemini-embedding-001

      - key: GOOGLE_CHAT_MODEL
        value: gemini-2.5-flash
      
      - key: CHUNK_SIZE
        value: 500
      
      - key: CHUNK_OVERLAP
        value: 50
      
      - key: SEARCH_TOP_K
        value: 5
      
      - key: HOST
        value: 0.0.0.0
      
      - key: PORT
        value: 10000  # Render assigns this automatically
      
      - key: LOG_LEVEL
        value: INFO
